<!DOCTYPE html>
<html lang="pt-PT">

    <title>Dashboard - Biblioteca API</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header>
        <h1>Biblioteca API</h1>
        <button onclick="logout()" style="width: auto; background-color: #e74c3c;">Sair</button>

    <div class="form-container" style="max-width: 800px;">

                    <th>Autor</th>
                    <th>Disponíveis</th>
                </tr>
            </thead>
            <tbody id="livros-lista">
                </tbody>
        </table>
    </div>

    <script src="/static/js/dashboard.js"></script>

</html>
